server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/autoescolan116?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_DEV_USER}
spring.datasource.password=${MYSQL_DEV_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.web.error.include-stacktrace=never
api.security.token.secret=${JWT_SECRET}
app.cors.allowed-origins=\
    "http://127.0.0.1:5500",\
    "http://localhost:5500",\
    "http://127.0.0.1:3000",\
    "http://localhost:3000"
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${E_MAIL}
spring.mail.password=${SENHA_APP}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000